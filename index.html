<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>subtl. — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #0a0a0a;
    color: #f0ece4;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    cursor: none;
    overflow: hidden;
  }

  #cursor {
    position: fixed;
    width: 5px; height: 5px;
    background: #f0ece4;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    mix-blend-mode: difference;
    transition: width .4s cubic-bezier(.22,1,.36,1), height .4s cubic-bezier(.22,1,.36,1);
  }

  /* animated dot grid background */
  body::before {
    content: '';
    position: fixed;
    inset: -100px;
    background-image: radial-gradient(circle, #181714 1px, transparent 1px);
    background-size: 28px 28px;
    animation: dotDrift 18s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  /* top & bottom ruled lines */
  .rule-top, .rule-bottom {
    position: fixed;
    left: 0;
    height: 1px;
    background: #1e1d1b;
    width: 0;
    animation: ruleGrow 2s cubic-bezier(.22,1,.36,1) forwards;
    z-index: 2;
  }
  .rule-top    { top: 0;    animation-delay: .2s; }
  .rule-bottom { bottom: 0; animation-delay: .5s; }

  /* corner brackets */
  .corner-bracket {
    position: fixed;
    width: 36px;
    height: 36px;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    animation: fadeIn 1.8s cubic-bezier(.22,1,.36,1) 1.2s forwards;
  }
  .corner-bracket::before,
  .corner-bracket::after {
    content: '';
    position: absolute;
    background: rgba(240,236,228,.1);
  }
  .corner-bracket::before { width: 1px; height: 100%; }
  .corner-bracket::after  { width: 100%; height: 1px; }

  .cb-tl { top: 2rem; left: 2rem; }
  .cb-tl::before { top: 0; left: 0; }
  .cb-tl::after  { top: 0; left: 0; }

  .cb-tr { top: 2rem; right: 2rem; }
  .cb-tr::before { top: 0; right: 0; left: auto; }
  .cb-tr::after  { top: 0; right: 0; }

  .cb-bl { bottom: 2rem; left: 2rem; }
  .cb-bl::before { bottom: 0; top: auto; left: 0; }
  .cb-bl::after  { bottom: 0; top: auto; left: 0; }

  .cb-br { bottom: 2rem; right: 2rem; }
  .cb-br::before { bottom: 0; top: auto; right: 0; left: auto; }
  .cb-br::after  { bottom: 0; top: auto; right: 0; }

  /* center stage */
  .stage {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 2.4rem;
    letter-spacing: .52em;
    color: #f0ece4;
    margin-right: -.52em;
    margin-bottom: 1.6rem;
    opacity: 0;
    animation: fadeUp 1.6s cubic-bezier(.22,1,.36,1) .3s forwards;
  }

  .services-line {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    letter-spacing: .2em;
    color: #b0aca2;
    text-transform: uppercase;
    margin-bottom: 3.2rem;
    opacity: 0;
    animation: fadeUp 1.6s cubic-bezier(.22,1,.36,1) .7s forwards;
  }

  .headline {
    font-size: clamp(2.8rem, 8vw, 6.4rem);
    font-weight: 300;
    letter-spacing: .04em;
    line-height: 1.1;
    opacity: 0;
    animation: fadeUp 1.8s cubic-bezier(.22,1,.36,1) 1s forwards;
  }
  .headline em {
    font-style: italic;
    color: #cdc7b8;
  }

  .sub {
    margin-top: 1.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    letter-spacing: .34em;
    color: #b0aca2;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1.6s cubic-bezier(.22,1,.36,1) 1.5s forwards;
  }

  .btn {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: .62rem;
    letter-spacing: .26em;
    text-transform: uppercase;
    text-decoration: none;
    padding: .9rem 2.6rem;
    background: #f0ece4;
    color: #0a0a0a;
    border: 1px solid #f0ece4;
    transition: background .4s cubic-bezier(.22,1,.36,1), border-color .4s cubic-bezier(.22,1,.36,1);
    cursor: pointer;
    margin-top: 2.8rem;
    opacity: 0;
    animation: fadeUp 1.6s cubic-bezier(.22,1,.36,1) 2.2s forwards;
  }
  .btn:hover { background: #cdc7b8; border-color: #cdc7b8; }

  /* footer corners */
  .corner-left, .corner-right {
    position: fixed;
    bottom: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: .9rem;
    letter-spacing: .2em;
    color: #7a776f;
    opacity: 0;
    animation: fadeIn 2s cubic-bezier(.22,1,.36,1) 2.4s forwards;
    z-index: 2;
  }
  .corner-left  { left: 2.4rem; }
  .corner-right { right: 2.4rem; }

  @keyframes ruleGrow { to { width: 100%; } }
  @keyframes fadeIn   { to { opacity: 1; } }
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes dotDrift { to { transform: translate(28px, 28px); } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; }
    .rule-top, .rule-bottom { width: 100%; }
    .logo, .services-line, .headline, .sub, .btn,
    .corner-left, .corner-right, .corner-bracket { opacity: 1; transform: none; }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div class="rule-top"></div>
<div class="rule-bottom"></div>
<div class="corner-bracket cb-tl"></div>
<div class="corner-bracket cb-tr"></div>
<div class="corner-bracket cb-bl"></div>
<div class="corner-bracket cb-br"></div>

<div class="stage">
  <p class="logo">s u b t l .</p>
  <p class="services-line">Scalp Micropigmentation &nbsp;·&nbsp; Hair &amp; Scalp &nbsp;·&nbsp; Consultation</p>
  <h1 class="headline">Coming <em>soon.</em></h1>
  <p class="sub">Wyke, Bradford &nbsp;·&nbsp; 2026</p>
  <p class="sub" style="animation-delay:1.8s">Appointments available from mid-August</p>
  <a href="contact.html" class="btn">Contact Us</a>
</div>

<span class="corner-left">subtl.co.uk</span>
<span class="corner-right">hello@subtl.co.uk</span>

<script>
  const cur = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });
</script>
</body>
</html>
