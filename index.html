<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>subtl. — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #0a0a0a;
    color: #f0ece4;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    cursor: none;
    overflow: hidden;
  }

  #cursor {
    position: fixed;
    width: 5px; height: 5px;
    background: #f0ece4;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    mix-blend-mode: difference;
    transition: width .3s cubic-bezier(.16,1,.3,1), height .3s cubic-bezier(.16,1,.3,1);
  }

  /* top & bottom ruled lines draw in */
  .rule-top, .rule-bottom {
    position: fixed;
    left: 0;
    height: 1px;
    background: #1e1d1b;
    width: 0;
    animation: ruleGrow 1.4s cubic-bezier(.16,1,.3,1) forwards;
  }
  .rule-top    { top: 0;    animation-delay: .1s; }
  .rule-bottom { bottom: 0; animation-delay: .3s; }

  /* center stage */
  .stage {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 0;
    position: relative;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 2.4rem;
    letter-spacing: .52em;
    color: #f0ece4;
    margin-right: -.52em;
    opacity: 0;
    animation: fadeIn 1s cubic-bezier(.16,1,.3,1) .4s forwards;
    margin-bottom: 3.6rem;
  }

  .headline {
    font-size: clamp(2.8rem, 8vw, 6.4rem);
    font-weight: 300;
    letter-spacing: .04em;
    line-height: 1.1;
    opacity: 0;
    transform: translateY(16px);
    animation: rise 1.1s cubic-bezier(.16,1,.3,1) .8s forwards;
  }
  .headline em {
    font-style: italic;
    color: #cdc7b8;
  }

  .sub {
    margin-top: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    letter-spacing: .34em;
    color: #b0aca2;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn .8s cubic-bezier(.16,1,.3,1) 1.5s forwards;
  }

  /* footer corners */
  .corner-left, .corner-right {
    position: fixed;
    bottom: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: .9rem;
    letter-spacing: .2em;
    color: #7a776f;
    opacity: 0;
    animation: fadeIn .8s 2s forwards;
  }
  .corner-left  { left: 2.4rem; }
  .corner-right { right: 2.4rem; }

  .services-line {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    letter-spacing: .2em;
    color: #b0aca2;
    text-transform: uppercase;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeIn .8s cubic-bezier(.16,1,.3,1) .7s forwards;
  }

  .btn {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: .62rem;
    letter-spacing: .26em;
    text-transform: uppercase;
    text-decoration: none;
    padding: .9rem 2.6rem;
    background: #f0ece4;
    color: #0a0a0a;
    border: 1px solid #f0ece4;
    transition: background .25s, border-color .25s;
    cursor: pointer;
  }
  .btn:hover { background: #cdc7b8; border-color: #cdc7b8; }

  @keyframes ruleGrow { to { width: 100%; } }
  @keyframes fadeIn   { to { opacity: 1; } }
  @keyframes rise     { to { opacity: 1; transform: translateY(0); } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; }
    .rule-top, .rule-bottom { width: 100%; }
    .logo, .headline, .sub, .corner-left, .corner-right { opacity: 1; transform: none; }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div class="rule-top"></div>
<div class="rule-bottom"></div>

<div class="stage">
  <p class="logo">s u b t l .</p>
  <p class="services-line">Scalp Micropigmentation &nbsp;·&nbsp; Hair &amp; Scalp &nbsp;·&nbsp; Consultation</p>
  <h1 class="headline">Coming <em>soon.</em></h1>
  <p class="sub">Wyke, Bradford &nbsp;·&nbsp; 2026</p>
  <p class="sub" style="margin-top:.9rem;animation-delay:2s">Appointments available from mid-August</p>
  <a href="contact.html" class="btn" style="margin-top:2.8rem;opacity:0;animation:fadeIn .8s cubic-bezier(.16,1,.3,1) 2.4s forwards">Contact Us</a>
</div>

<span class="corner-left">subtl.co.uk</span>
<span class="corner-right">hello@subtl.co.uk</span>

<script>
  const cur = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });
</script>
</body>
</html>
